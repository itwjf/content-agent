# ContentAgent Docker Compose - MySQL版本
# 包含完整的数据库支持

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: content-agent-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-content_agent}
      MYSQL_USER: ${MYSQL_USER:-content_agent}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-content123}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - content-agent-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Qdrant 向量数据库
  qdrant:
    image: qdrant/qdrant
    container_name: content-agent-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - content-agent-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI 后端服务 (MySQL版本)
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.mysql
    container_name: content-agent-backend-mysql
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER:-content_agent}:${MYSQL_PASSWORD:-content123}@mysql:3306/${MYSQL_DATABASE:-content_agent}
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - content-agent-net
    command: ["python", "-m", "app.main_mysql"]

  # Vue 前端服务
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: content-agent-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - content-agent-net

volumes:
  mysql_data:
    driver: local
  qdrant_data:
    driver: local

networks:
  content-agent-net:
    driver: bridge