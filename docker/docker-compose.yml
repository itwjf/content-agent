# ContentAgent Docker Compose
# 用于本地开发和生产部署

services:
  # MySQL 数据库（可选，目前后端使用内存存储）
  # mysql:
  #   image: mysql:8.0
  #   container_name: content-agent-mysql
  #   restart: unless-stopped
  #   environment:
  #     MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
  #     MYSQL_DATABASE: ${MYSQL_DATABASE:-content_agent}
  #     MYSQL_USER: ${MYSQL_USER:-content_agent}
  #     MYSQL_PASSWORD: ${MYSQL_PASSWORD:-content123}
  #   ports:
  #     - "3307:3306"
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #   networks:
  #     - content-agent-net

  # Qdrant 向量数据库
  qdrant:
    image: qdrant/qdrant
    container_name: content-agent-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - content-agent-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI 后端服务
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: content-agent-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - ./backend.env
    environment:
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.deepseek.com}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
      - SILICONFLOW_API_KEY=${SILICONFLOW_API_KEY}
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - DEBUG=${DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      - qdrant
    networks:
      - content-agent-net

  # Vue 前端服务
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: content-agent-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - content-agent-net

volumes:
  qdrant_data:
    driver: local

networks:
  content-agent-net:
    driver: bridge
